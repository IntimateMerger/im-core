auditLevel: high
engineStrict: true
ignoreScripts: true
minimumReleaseAge: 10080 # 1 week
minimumReleaseAgeExclude:
  - esbuild
  - '@esbuild/*'
  - form-data
  - tmp
overrides:
  tmp@<0.2.7: '>=0.2.7 <1.0.0'
  esbuild@<0.28.1: '>=0.28.1 <1.0.0'
  ws@<8.21.0: '>=8.21.0 <9.0.0'
  form-data@<4.0.6: '>=4.0.6 <5.0.0'
packageManagerStrictVersion: true
savePrefix: ""
trustPolicy: no-downgrade
trustPolicyIgnoreAfter: 10080 # 1 week
